<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/landyct/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@100;300;400;500&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/landyct/index.js"></script>
    <link rel="stylesheet" crossorigin href="/landyct/assets/index-D2jaFzOZ.css">
  </head>
  <body>
    <header class="header">
  <div class="container">
    <a class="header-logo" href="/src/index.html">YPOJ</a>
  <nav>
      <a class="menu-name" href="#about">About Us</a>
      <a class="menu-name" href="#jobs">Jobs</a>
      <a class="menu-name" href="#contacts">Contacts</a>
      <button class="apply-button">Apply Now</button>
  </nav>
  </div>
</header>


    <main>
      <!-- Loads the specified .html file -->
      <section id="about" class="hero-section">
  <div class="container">
    <div class="hero-content">
      <h1>Your Vision, Our Mission</h1>
      <p>Empowering individuals with the tools and skills to achieve their dreams. Join us and take the first step towards your future today.</p>
      <a href="#get-started" class="hero-button">Get Started</a>
    </div>
  </div>
</section>
      <section id="about" class="jobs-section">
    <div class="container">
        <div class="content-wrapper">
            <h2>Job Listings</h2>

            <div class="search-bar">
                <input type="text" id="keyword" placeholder="Job Title, Phrase or Keyword">
                <button onclick="filterJobs()">Search</button>
            </div>

            <div class="filters">
                <select id="jobType">
                    <option value="">Job Type</option>
                    <option value="Temporary">Temporary</option>
                    <option value="Day Work">Day Work</option>
                    <option value="Seasonal">Seasonal</option>
                    <option value="Permanent">Permanent</option>
                    <option value="Shoreside">Shoreside</option>
                </select>
                <select id="yachtType">
                    <option value="">Yacht Type</option>
                    <option value="Motor">Motor</option>
                    <option value="Sailing">Sailing</option>
                </select>
                <select id="position">
                    <option value="">Position</option>
                    <option value="Galley">Galley</option>
                    <option value="Interior">Interior</option>
                    <option value="Deck">Deck</option>
                    <option value="Engineering">Engineering</option>
                </select>
                <select id="vesselSize">
                    <option value="">Vessel Sizes</option>
                    <option value="0-30m">0-30m</option>
                    <option value="31m-50m">31m-50m</option>
                    <option value="51m-80m">51m-80m</option>
                    <option value="81m-100m">81m-100m</option>
                    <option value="101m+">101m+</option>
                </select>
            </div>

            <div class="jobs" id="jobList">
                <!-- Jobs will be dynamically inserted here -->
            </div>
        </div>
    </div>
</section>

    </main>

    <footer class="footer">
  <div class="container">
    
  </div>
</footer>


  </body>
</html>
